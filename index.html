<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abijeet Dhillon's Website</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">
</head>
<body class="main-content">
    <header class="section s1 header active" id="home">
        
    </header>
    <main>
        <section class="section s2 about" id="about">
        </section>
        <section class="section s3 education" id="education">
        </section>
        <section class="section s4 portfolio" id="portfolio">
        </section>
        <section class="section s5 contact" id="contact">
        </section>
    </main>
    <div class="controls">
        <div class="control c1 active-btn" data-id="home">
            <i class="fas fa-home"></i>
        </div>
        <div class="control c2">
            <i class="fas fa-user" data-id="about"></i>
        </div>
        <div class="control c3">
            <i class="fas fa-university" data-id="education"></i>
        </div>
        <div class="control c4">
            <i class="fas fa-laptop-code" data-id="portfolio"></i>
        </div>
        <div class="control c5">
            <i class="fas fa-envelope" data-id="contact"></i>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
